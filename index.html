<!DOCTYPE html>
<html lang="sr">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Praćenje bunara — ThingSpeak</title>

<!-- Chart.js + date adapter (CDN) -->
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.3/dist/chart.umd.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/luxon@3.4.4/build/global/luxon.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chartjs-adapter-luxon@1.3.1/dist/chartjs-adapter-luxon.umd.min.js"></script>

<style>
  :root, body.dark {
    --bg: #0f172a;
    --bg-2: #1e293b;
    --panel: #1e293b;
    --panel-2: #273449;
    --border: #334155;
    --text: #e2e8f0;
    --muted: #94a3b8;
    --c1: #38bdf8; /* Stari Bunar */
    --c2: #34d399; /* Novi Bunar */
    --accent: #6366f1;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    font-family: system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
    background: radial-gradient(1200px 600px at 20% -10%, var(--bg-2) 0%, var(--bg) 60%);
    color: var(--text);
    min-height: 100vh;
    padding: 24px;
    transition: background .25s, color .25s;
  }
  header { max-width: 1100px; margin: 0 auto 20px; }
  h1 { font-size: 22px; margin: 0 0 4px; font-weight: 650; }
  .sub { color: var(--muted); font-size: 13px; }

  .controls {
    max-width: 1100px; margin: 0 auto 18px;
    display: flex; gap: 8px; flex-wrap: wrap; align-items: center;
  }
  .seg { display: inline-flex; background: var(--panel); border-radius: 10px; padding: 4px; gap: 4px; }
  .seg button {
    border: 0; background: transparent; color: var(--muted);
    padding: 8px 16px; border-radius: 7px; cursor: pointer;
    font-size: 14px; font-weight: 600; transition: .15s;
  }
  .seg button:hover { color: var(--text); }
  .seg button.active { background: var(--accent); color: #fff; }
  .status { margin-left: auto; color: var(--muted); font-size: 13px; }
  .status.err { color: #ef4444; }

  .banner { max-width: 1100px; margin: 0 auto 18px; padding: 12px 16px; border-radius: 12px;
            background: #7f1d1d; color: #fee2e2; border: 1px solid #ef4444;
            font-weight: 600; display: flex; align-items: center; gap: 10px; }
  .banner .ico { font-size: 18px; }
  .banner[hidden] { display: none; }

  .cards { max-width: 1100px; margin: 0 auto 18px; display: grid; gap: 14px;
           grid-template-columns: repeat(2, 1fr); }
  .card { background: var(--panel); border: 1px solid var(--border); border-radius: 14px; padding: 16px 18px; }
  .card h2 { margin: 0 0 12px; font-size: 15px; display: flex; align-items: center; gap: 8px; }
  .dot { width: 11px; height: 11px; border-radius: 50%; display: inline-block; }
  .wico { display: inline-flex; align-items: center; justify-content: center;
          width: 26px; height: 26px; flex: 0 0 auto; }
  .wico svg { width: 100%; height: 100%; }
  .stats { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; }
  .stat { background: var(--panel-2); border-radius: 10px; padding: 10px 12px; }
  .stat .label { font-size: 11px; color: var(--muted); text-transform: uppercase; letter-spacing: .04em; }
  .stat .val { font-size: 20px; font-weight: 700; margin-top: 2px; }
  .stat .when { font-size: 11px; color: var(--muted); margin-top: 2px; }

  .charts { max-width: 1100px; margin: 0 auto; display: grid; gap: 16px; }
  .chart-wrap { background: var(--panel);
                border: 1px solid var(--border); border-radius: 14px; padding: 14px 18px 8px; }
  .chart-wrap h3 { margin: 0 0 6px; font-size: 14px; display: flex; align-items: center; gap: 8px; color: var(--text); }
  .chart-box { position: relative; height: 300px; }
  footer { max-width: 1100px; margin: 16px auto 0; color: var(--muted); font-size: 12px; text-align: center; }
  @media (max-width: 680px) { .cards { grid-template-columns: 1fr; } }

  /* Tabs (Osnovno / Napredno) */
  .tabs { max-width: 1100px; margin: 0 auto 18px; display: flex;
          background: var(--panel); border-radius: 12px; padding: 5px; gap: 5px; }
  .tabs button { flex: 1; border: 0; background: transparent; color: var(--muted);
                 padding: 12px 16px; border-radius: 9px; cursor: pointer;
                 font-size: 16px; font-weight: 650; transition: .15s; }
  .tabs button:hover { color: var(--text); }
  .tabs button.active { background: var(--accent); color: #fff; }
  .hidden { display: none !important; }

  /* Osnovno (Basic) view — big current readings, fills the screen */
  #view-basic { max-width: 1100px; margin: 0 auto; display: flex;
                flex-direction: column; gap: 16px;
                min-height: calc(100dvh - 110px); }
  .big-card { flex: 1; background: var(--panel); border: 1px solid var(--border);
              border-radius: 18px; padding: 24px; display: flex; flex-direction: column;
              align-items: center; justify-content: center; text-align: center; gap: 12px; }
  .big-name { font-size: 20px; font-weight: 650; color: var(--muted);
              display: flex; align-items: center; gap: 10px; }
  .big-name .wico { width: 30px; height: 30px; }
  .big-main { display: flex; align-items: center; justify-content: center; gap: clamp(14px, 5vw, 32px); }
  .big-ico { width: clamp(72px, 26vw, 140px); height: clamp(72px, 26vw, 140px); flex: 0 0 auto; }
  .big-val { font-size: clamp(56px, 18vw, 92px); font-weight: 800; line-height: 1;
             letter-spacing: -.02em; }
  .big-unit { font-size: .42em; font-weight: 600; color: var(--muted); margin-left: 8px; }
  .big-when { font-size: 14px; color: var(--muted); }
</style>
</head>
<body>

<div class="tabs" id="tabs">
  <button data-tab="basic" class="active">Osnovno</button>
  <button data-tab="advanced">Napredno</button>
</div>

<!-- ===== Osnovno (Basic): current readings, full screen ===== -->
<section id="view-basic" class="view">
  <div class="big-card">
    <div class="big-name">Stari Bunar</div>
    <div class="big-main">
      <span class="wico big-ico" data-well="old" style="color:var(--c1)"></span>
      <span class="big-val" id="b1-val" style="color:var(--c1)">–</span>
    </div>
    <div class="big-when" id="b1-t"></div>
  </div>
  <div class="big-card">
    <div class="big-name">Novi Bunar</div>
    <div class="big-main">
      <span class="wico big-ico" data-well="new" style="color:var(--c2)"></span>
      <span class="big-val" id="b2-val" style="color:var(--c2)">–</span>
    </div>
    <div class="big-when" id="b2-t"></div>
  </div>
</section>

<!-- ===== Napredno (Advanced): full dashboard ===== -->
<section id="view-advanced" class="view hidden">
  <div class="controls">
    <div class="seg" id="ranges">
      <button data-range="1h">1č</button>
      <button data-range="1d" class="active">1d</button>
      <button data-range="7d">7d</button>
      <button data-range="30d">30d</button>
    </div>
    <span class="status" id="status">Učitavanje…</span>
  </div>

  <div class="banner" id="signal-banner" hidden>
    <span class="ico">⚠️</span><span id="signal-text"></span>
  </div>

  <div class="charts">
    <div class="card">
      <h2><span class="wico" data-well="old" style="color:var(--c1)"></span> Stari Bunar</h2>
      <div class="stats">
        <div class="stat"><div class="label">Min</div><div class="val" id="s1-min">–</div><div class="when" id="s1-min-t"></div></div>
        <div class="stat"><div class="label">Maks</div><div class="val" id="s1-max">–</div><div class="when" id="s1-max-t"></div></div>
        <div class="stat"><div class="label">Trenutno</div><div class="val" id="s1-last">–</div><div class="when" id="s1-last-t"></div></div>
      </div>
    </div>
    <div class="chart-wrap">
      <h3><span class="wico" data-well="old" style="color:var(--c1)"></span> Stari Bunar</h3>
      <div class="chart-box"><canvas id="chart1"></canvas></div>
    </div>

    <div class="card">
      <h2><span class="wico" data-well="new" style="color:var(--c2)"></span> Novi Bunar</h2>
      <div class="stats">
        <div class="stat"><div class="label">Min</div><div class="val" id="s2-min">–</div><div class="when" id="s2-min-t"></div></div>
        <div class="stat"><div class="label">Maks</div><div class="val" id="s2-max">–</div><div class="when" id="s2-max-t"></div></div>
        <div class="stat"><div class="label">Trenutno</div><div class="val" id="s2-last">–</div><div class="when" id="s2-last-t"></div></div>
      </div>
    </div>
    <div class="chart-wrap">
      <h3><span class="wico" data-well="new" style="color:var(--c2)"></span> Novi Bunar</h3>
      <div class="chart-box"><canvas id="chart2"></canvas></div>
    </div>
  </div>
</section>

<footer>Automatsko osvežavanje na 60s · vreme prikazano u vašoj lokalnoj vremenskoj zoni</footer>

<script>
// ---- Local-usage credentials (private channel) ----
const CHANNEL_ID = "3030085";
const READ_API_KEY = "GCO9R4MUA2YCOHCY";

// range -> ThingSpeak query params (averaging keeps point counts sane)
// NOTE: ThingSpeak applies `average` only over the last ~8000 RAW records of the
// requested window. A device posting ~once/min produces ~8000 records in ~5.3 days,
// so a `days=7` averaged query silently drops the oldest ~1.7 days — which shows up
// as an empty gap on the left of the 7d chart (the 30d view escapes this because
// daily averaging is served from a full-window path). `maxChunkMs` splits such a
// window into sub-requests that each stay under the cap; results are merged below.
const RANGES = {
  "1h":  { minutes: 60,  average: null, gran: "1 min",  ms: 60*60*1000,        unit: "minute" },
  "1d":  { days: 1,      average: 60,   gran: "1 sat",   ms: 24*60*60*1000,     unit: "hour"   },
  "7d":  { days: 7,      average: 240,  gran: "4 sata",  ms: 7*24*60*60*1000,   unit: "day", maxChunkMs: 4*24*60*60*1000 },
  "30d": { days: 30,     average: 1440, gran: "1 dan",   ms: 30*24*60*60*1000,  unit: "day"    },
};

const DT = luxon.DateTime;
const LOCALE = "sr-Latn";
const UNIT = "m"; // Y-axis unit (meters)
const SIGNAL_TIMEOUT_MS = 90 * 1000; // no signal if last entry older than this
let chart1, chart2;
let currentRange = "1d";
let refreshTimer;

function tsParam(ms) {
  return DT.fromMillis(ms, { zone: "utc" }).toFormat("yyyy-MM-dd HH:mm:ss");
}

function buildUrl(range, startMs, endMs) {
  const cfg = RANGES[range];
  const p = new URLSearchParams({ api_key: READ_API_KEY });
  if (startMs != null && endMs != null) {
    // Explicit window: lets ThingSpeak average over exactly this slice.
    p.set("start", tsParam(startMs));
    p.set("end", tsParam(endMs));
  } else {
    if (cfg.minutes) p.set("minutes", cfg.minutes);
    if (cfg.days) p.set("days", cfg.days);
  }
  if (cfg.average) p.set("average", cfg.average);
  p.set("timezone", "UTC"); // we convert to local on the client
  return `https://api.thingspeak.com/channels/${CHANNEL_ID}/feeds.json?${p.toString()}`;
}

async function fetchJson(url) {
  const res = await fetch(url);
  if (!res.ok) throw new Error(`HTTP ${res.status}`);
  return res.json();
}

// Fetch a range's feeds, chunking long averaged windows so each sub-request stays
// under ThingSpeak's ~8000 raw-record averaging cap (see RANGES note above).
async function fetchFeeds(range) {
  const cfg = RANGES[range];
  if (cfg.average && cfg.maxChunkMs && cfg.ms > cfg.maxChunkMs) {
    const endMs = DT.now().toMillis();
    const startMs = endMs - cfg.ms;
    const urls = [];
    for (let s = startMs; s < endMs; s += cfg.maxChunkMs) {
      urls.push(buildUrl(range, s, Math.min(s + cfg.maxChunkMs, endMs)));
    }
    const chunks = await Promise.all(urls.map(u => fetchJson(u).then(d => d.feeds || [])));
    // Merge and de-duplicate by timestamp (chunk boundaries share a bucket).
    const byTime = new Map();
    for (const feeds of chunks) {
      for (const f of feeds) byTime.set(f.created_at, f);
    }
    return [...byTime.values()].sort((a, b) =>
      a.created_at < b.created_at ? -1 : a.created_at > b.created_at ? 1 : 0);
  }
  const data = await fetchJson(buildUrl(range));
  return data.feeds || [];
}

function setStatus(msg, isErr=false) {
  const el = document.getElementById("status");
  el.textContent = msg;
  el.classList.toggle("err", isErr);
}

function fmt(v) {
  return (v === null || v === undefined || Number.isNaN(v)) ? "–" : Number(v).toFixed(2);
}

function computeStats(points) {
  const valid = points.filter(p => p.y !== null && !Number.isNaN(p.y));
  if (!valid.length) return null;
  let min = valid[0], max = valid[0];
  for (const p of valid) {
    if (p.y < min.y) min = p;
    if (p.y > max.y) max = p;
  }
  return { min, max, last: valid[valid.length - 1] };
}

function whenStr(p) {
  return p ? DT.fromMillis(p.x).toLocal().setLocale(LOCALE).toFormat("d. LLL, HH:mm") : "";
}

function updateCard(prefix, stats) {
  const ids = ["min", "max", "last"];
  if (!stats) {
    ids.forEach(k => {
      document.getElementById(`${prefix}-${k}`).textContent = "–";
      document.getElementById(`${prefix}-${k}-t`).textContent = "";
    });
    return;
  }
  document.getElementById(`${prefix}-min`).textContent = fmt(stats.min.y);
  document.getElementById(`${prefix}-max`).textContent = fmt(stats.max.y);
  document.getElementById(`${prefix}-last`).textContent = fmt(stats.last.y);
  document.getElementById(`${prefix}-min-t`).textContent = whenStr(stats.min);
  document.getElementById(`${prefix}-max-t`).textContent = whenStr(stats.max);
  document.getElementById(`${prefix}-last-t`).textContent = whenStr(stats.last);
}

function themeColors() {
  return {
    text: "#e2e8f0",
    muted: "#94a3b8",
    grid: "rgba(148,163,184,.1)",
    tipBg: "#0f172a",
    tipBorder: "#334155",
  };
}

function makeChart(canvasId, label, color, bg, yMin, yMax) {
  const c = themeColors();
  const ctx = document.getElementById(canvasId).getContext("2d");
  return new Chart(ctx, {
    type: "line",
    data: {
      datasets: [
        { label, data: [], borderColor: color,
          backgroundColor: bg, borderWidth: 2, pointRadius: 0,
          tension: .25, fill: true, spanGaps: true },
      ]
    },
    options: {
      responsive: true, maintainAspectRatio: false,
      interaction: { mode: "index", intersect: false },
      plugins: {
        legend: { display: false },
        tooltip: {
          backgroundColor: c.tipBg, borderColor: c.tipBorder, borderWidth: 1,
          titleColor: c.text, bodyColor: c.text, padding: 10,
          callbacks: {
            title: (items) => DT.fromMillis(items[0].parsed.x).toLocal().setLocale(LOCALE).toFormat("d. LLL yyyy. HH:mm"),
            label: (item) => `${item.dataset.label}: ${fmt(item.parsed.y)} ${UNIT}`
          }
        }
      },
      scales: {
        x: { type: "time",
             time: { tooltipFormat: "HH:mm",
                     displayFormats: { minute: "d. LLL HH:mm", hour: "d. LLL HH:mm", day: "d. LLL", week: "d. LLL", month: "LLL yy" } },
             adapters: { date: { locale: LOCALE } },
             ticks: { color: c.muted, maxRotation: 50, minRotation: 50, autoSkip: true, autoSkipPadding: 12 },
             grid: { color: c.grid } },
        y: { min: yMin, max: yMax,
             title: { display: true, text: `Nivo (${UNIT})`, color: c.muted },
             ticks: { color: c.muted, callback: (v) => `${Number(v).toFixed(2)} ${UNIT}` },
             grid: { color: c.grid } }
      }
    }
  });
}

function makeCharts() {
  chart1 = makeChart("chart1", "Stari Bunar", "#38bdf8", "rgba(56,189,248,.12)", 0, 4);
  chart2 = makeChart("chart2", "Novi Bunar", "#34d399", "rgba(52,211,153,.12)", 0, 12);
}

async function load(range) {
  setStatus("Učitavanje…");
  try {
    const feeds = await fetchFeeds(range);

    const s1 = [], s2 = [];
    for (const f of feeds) {
      const t = DT.fromISO(f.created_at, { zone: "utc" }).toMillis();
      const n1 = parseFloat(f.field1);
      const n2 = parseFloat(f.field2);
      s1.push({ x: t, y: Number.isFinite(n1) ? n1 : null });
      s2.push({ x: t, y: Number.isFinite(n2) ? n2 : null });
    }

    chart1.data.datasets[0].data = s1;
    chart2.data.datasets[0].data = s2;

    // Pin the x-axis to the full selected window (data may start later due to gaps)
    const xMax = DT.now().toMillis();
    const xMin = xMax - RANGES[range].ms;
    for (const ch of [chart1, chart2]) {
      ch.options.scales.x.time.unit = RANGES[range].unit;
      ch.options.scales.x.min = xMin;
      ch.options.scales.x.max = xMax;
    }

    chart1.update();
    chart2.update();

    updateCard("s1", computeStats(s1));
    updateCard("s2", computeStats(s2));

    setStatus(`${feeds.length} tačaka · ažurirano ${DT.now().toFormat("HH:mm:ss")}`);
  } catch (e) {
    setStatus(`Greška: ${e.message}`, true);
  }
  checkSignal();
}

function selectRange(range) {
  currentRange = range;
  document.querySelectorAll("#ranges button").forEach(b =>
    b.classList.toggle("active", b.dataset.range === range));
  load(range);
}

// ---- Signal / connectivity check (uses the channel's true last entry) ----
function ageStr(ms) {
  const min = Math.round(ms / 60000);
  if (min < 60) return `pre ${min} min`;
  const h = Math.floor(min / 60);
  if (h < 24) return `pre ${h} h`;
  const d = Math.floor(h / 24);
  return `pre ${d} ${d === 1 ? "dan" : "dana"}`;
}

function showBanner(text) {
  document.getElementById("signal-text").textContent = text;
  document.getElementById("signal-banner").hidden = false;
}
function hideBanner() {
  document.getElementById("signal-banner").hidden = true;
}

async function checkSignal() {
  try {
    const url = `https://api.thingspeak.com/channels/${CHANNEL_ID}/feeds/last.json?api_key=${READ_API_KEY}&timezone=UTC`;
    const res = await fetch(url);
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    const txt = (await res.text()).trim();
    if (!txt || txt === "-1") { showBanner("Nema signala sa ThingSpeak-a — nema zabeleženih podataka."); return; }
    const last = JSON.parse(txt);
    if (!last || !last.created_at) { showBanner("Nema signala sa ThingSpeak-a — nema zabeleženih podataka."); return; }
    const ts = DT.fromISO(last.created_at, { zone: "utc" }).toMillis();
    const age = Date.now() - ts;
    if (age > SIGNAL_TIMEOUT_MS) {
      const when = DT.fromMillis(ts).toLocal().setLocale(LOCALE).toFormat("d. LLL yyyy. HH:mm");
      showBanner(`Nema signala sa ThingSpeak-a — poslednji zapis: ${when} (${ageStr(age)}).`);
    } else {
      hideBanner();
    }
  } catch (e) {
    showBanner(`Nema veze sa ThingSpeak-om (${e.message}).`);
  }
}

document.getElementById("ranges").addEventListener("click", (e) => {
  const btn = e.target.closest("button");
  if (btn) selectRange(btn.dataset.range);
});

// ---- Tabs (Osnovno / Napredno) ----
let currentTab = "basic";
let advancedInited = false;

async function loadBasic() {
  try {
    const url = `https://api.thingspeak.com/channels/${CHANNEL_ID}/feeds/last.json?api_key=${READ_API_KEY}&timezone=UTC`;
    const res = await fetch(url);
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    const txt = (await res.text()).trim();
    const last = (txt && txt !== "-1") ? JSON.parse(txt) : null;
    const setVal = (id, raw) => {
      const v = parseFloat(raw);
      document.getElementById(id).innerHTML =
        `${fmt(Number.isFinite(v) ? v : null)}<span class="big-unit">${UNIT}</span>`;
    };
    setVal("b1-val", last && last.field1);
    setVal("b2-val", last && last.field2);
    const when = last && last.created_at
      ? whenStr({ x: DT.fromISO(last.created_at, { zone: "utc" }).toMillis() })
      : "";
    document.getElementById("b1-t").textContent = when;
    document.getElementById("b2-t").textContent = when;
  } catch (e) {
    document.getElementById("b1-t").textContent = `Greška: ${e.message}`;
    document.getElementById("b2-t").textContent = "";
  }
}

function switchTab(tab) {
  currentTab = tab;
  document.querySelectorAll("#tabs button").forEach(b =>
    b.classList.toggle("active", b.dataset.tab === tab));
  document.getElementById("view-basic").classList.toggle("hidden", tab !== "basic");
  document.getElementById("view-advanced").classList.toggle("hidden", tab !== "advanced");
  if (tab === "advanced") {
    if (!advancedInited) { advancedInited = true; makeCharts(); selectRange(currentRange); }
    else { load(currentRange); }
  } else {
    loadBasic();
  }
}

document.getElementById("tabs").addEventListener("click", (e) => {
  const btn = e.target.closest("button");
  if (btn) switchTab(btn.dataset.tab);
});

function refreshActive() {
  if (currentTab === "basic") loadBasic();
  else if (advancedInited) load(currentRange);
}

// ---- Well icons (rustic stone well vs. modern tap) ----
const WELL_ICONS = {
  // Stari Bunar — classic roofed wishing well
  old: `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round">
    <path d="M3 9.5 L12 3.5 L21 9.5"/>
    <path d="M7 9.5 V13.5"/>
    <path d="M17 9.5 V13.5"/>
    <path d="M6 11 H18"/>
    <path d="M12 11 V13"/>
    <path d="M10.4 13 H13.6 L13.1 15.2 H10.9 Z"/>
    <path d="M6.5 13.5 L5.5 20.5 H18.5 L17.5 13.5 Z"/>
    <path d="M9 17.2 H15"/>
  </svg>`,
  // Novi Bunar — modern gooseneck tap with a water drop
  new: `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round">
